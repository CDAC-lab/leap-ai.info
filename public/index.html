  <style>
    :root {
      --bg:        #ffffff;
      --paper:     #ffffff;
      --ink:       #0f1a14;
      --accent:    #4a6a3a;
      --secondary: #b8633a;

      --hair-strong: rgba(15, 26, 20, 0.22);
    }
    html, body { margin:0; padding:0; background: #ffffff !important; background-color: #ffffff !important;
                 color: var(--ink); font-family: 'Geist', ui-sans-serif, sans-serif;
                 -webkit-font-smoothing: antialiased; }
    #root, .lp-shell { background: #ffffff !important; }
    *, *::before, *::after { box-sizing: border-box; }
    img { display:block; max-width:100%; }
    button { font-family: inherit; }
    section { width: 100%; }
    .lp-shell { max-width: 1440px; margin: 0 auto; }
    @media (max-width: 900px) {
      .col-2  { grid-template-columns: 1fr !important; }
      .col-3  { grid-template-columns: 1fr !important; }
      .col-4  { grid-template-columns: 1fr 1fr !important; }
      .col-6  { grid-template-columns: 1fr 1fr !important; }

      .explore-grid { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 1180px) {
      .explore-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }

     
    body { transition: opacity .35s ease; }
    body.lp-leaving { opacity: 0; }
    .lp-route-veil {
      position: fixed;
      inset: 0;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
      z-index: 9999;
    }
    .lp-route-veil.active { opacity: 1; pointer-events: auto; }
    .lp-route-veil-mark {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex; align-items: center; gap: 12px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: .7;
    }
    .lp-route-veil-mark .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: lp-pulse 1.1s ease-in-out infinite;
    }
    @keyframes lp-pulse {
      0%, 100% { opacity: .35; transform: scale(.8); }
      50%      { opacity: 1;   transform: scale(1.1); }
    }
    @media (prefers-reduced-motion: reduce) {
      body, .lp-route-veil { transition: none !important; }
      .lp-route-veil-mark .dot { animation: none !important; }
    }
  </style>
